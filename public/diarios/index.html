<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Diários | Portal Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0047AB;
            --primary-red: #D32F2F;
            --primary-green: #059669;
            --primary-yellow: #ca8a04;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 40px 20px;
        }

        .aurora-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            background: var(--primary-blue);
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            background: var(--primary-red);
            bottom: -10%;
            right: -10%;
        }

        @keyframes move {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(100px, 100px);
            }
        }

        .header-logos {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 15px;
        }

        .logo-wrapper img {
            height: 40px;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .status-geral-container {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-coletando {
            background: var(--primary-yellow);
            box-shadow: 0 0 20px var(--primary-yellow);
            color: white;
        }

        .bg-finalizado {
            background: var(--primary-green);
            box-shadow: 0 0 20px var(--primary-green);
            color: white;
        }

        .bg-parado {
            background: #334155;
            color: #94a3b8;
        }

        /* Estilização dos Selects */
        .selection-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            min-width: 200px;
            font-weight: 600;
        }

        select option {
            background: #0f172a;
            color: white;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-start {
            background: var(--primary-green);
        }

        .btn-reset {
            background: #334155;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .turmas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .turma-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.5s;
        }

        .turma-concluida {
            opacity: 0.4;
            order: 999;
        }

        .turma-nome {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .disciplina-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 8px;
            padding: 5px 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        .status-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 800;
        }

        .status-true {
            background: rgba(5, 150, 105, 0.2);
            color: #34d399;
            border: 1px solid #059669;
        }

        .status-false {
            background: rgba(211, 47, 47, 0.2);
            color: #f87171;
            border: 1px solid #D32F2F;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        footer {
            margin-top: 40px;
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="header-logos">
        <div class="logo-wrapper"><img src="https://cdn.es.gov.br/images/logo/governo/brasao/center/Brasao_Governo.png"
                alt=""></div>
        <div class="logo-wrapper"><img src="/img/2.png" alt=""></div>
        <div class="logo-wrapper"><img src="/img/1.png" alt=""></div>
    </header>

    <div class="main-card">
        <div style="text-align: center; margin-bottom: 10px;">
            <div id="statusGeralBadge" class="status-geral-container bg-parado">PARADO</div>
            <h1 style="font-size: 28px; margin-bottom: 5px;">Monitoramento de Diários</h1>
            <p style="color: #94a3b8; font-size: 14px;">Sincronização em tempo real com o SEGES</p>
        </div>

        <div class="selection-group">
            <select id="selectMes">
                <option value="">Selecione o Mês</option>
                <option value="1/2026">01 - Janeiro</option>
                <option value="2/2026">02 - Fevereiro</option>
                <option value="3/2026">03 - Março</option>
                <option value="4/2026">04 - Abril</option>
                <option value="5/2026">05 - Maio</option>
                <option value="6/2026">06 - Junho</option>
                <option value="7/2026">07 - Julho</option>
                <option value="8/2026">08 - Agosto</option>
                <option value="9/2026">09 - Setembro</option>
                <option value="10/2026">10 - Outubro</option>
                <option value="11/2026">11 - Novembro</option>
                <option value="12/2026">12 - Dezembro</option>
            </select>

            <select id="selectEtapa">
                <option value="">Selecione a Etapa</option>
                <option value="6464">1º TRIMESTRE</option>
                <option value="6465">2º TRIMESTRE</option>
                <option value="6466">3º TRIMESTRE</option>
            </select>
        </div>

        <div class="controls">
            <button id="btnStart" class="btn btn-start" onclick="controle('start')">▶ Iniciar Coleta</button>
        </div>

        <div id="containerTurmas" class="turmas-grid">
            <p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">Aguardando parâmetros e início...</p>
        </div>
    </div>

    <footer>EEEM MÁRIO GURGEL • PROTOCOLO DE SINCRONIZAÇÃO</footer>

    <script>
        async function controle(rota) {
            const mes = document.getElementById('selectMes').value;
            const etapa = document.getElementById('selectEtapa').value;

            if (rota === 'start') {
                if (!mes || !etapa) {
                    alert("Por favor, selecione o MÊS e a ETAPA antes de iniciar.");
                    return;
                }
            }

            try {
                await fetch(`/diarios/${rota}?mes=${mes}&etapa=${etapa}`);
            } catch (err) {
                console.error("Erro ao enviar comando:", err);
            }
        }

        function atualizarBadgeGlobal(status) {
            const badge = document.getElementById('statusGeralBadge');
            const btnStart = document.getElementById('btnStart');
            const selectMes = document.getElementById('selectMes');
            const selectEtapa = document.getElementById('selectEtapa');

            badge.innerText = status === true ? "CONCLUÍDO" : (status || "PARADO");

            badge.classList.remove('bg-coletando', 'bg-finalizado', 'bg-parado');

            if (status === "Coletando...") {
                badge.classList.add('bg-coletando');
                btnStart.disabled = true;
                selectMes.disabled = true;
                selectEtapa.disabled = true;
            } else if (status === "Finalizado") {
                badge.classList.add('bg-finalizado');
                btnStart.disabled = false;
                selectMes.disabled = false;
                selectEtapa.disabled = false;
            } else {
                badge.classList.add('bg-parado');
                btnStart.disabled = false;
                selectMes.disabled = false;
                selectEtapa.disabled = false;
            }
        }

        let jaFinalizouTudo = false;
        async function atualizarStatus() {
            try {
                if (jaFinalizouTudo) return;
                const response = await fetch('/api/turmas');
                const data = await response.json();

                const turmas = data.turmas || [];
                const statusGeral = data.statusDiario || "PARADO";

                atualizarBadgeGlobal(statusGeral);

                if (!turmas || turmas.length === 0) return;

                const container = document.getElementById('containerTurmas');

                const turmasOrdenadas = [...turmas].sort((a, b) => {
                    const aConcluida = a.prof?.every(p => p.statusDiario === true) ? 1 : 0;
                    const bConcluida = b.prof?.every(p => p.statusDiario === true) ? 1 : 0;
                    return aConcluida - bConcluida;
                });

                let html = '';
                let totalGeralDisciplinas = 0;
                let totalGeralConcluidas = 0;

                turmasOrdenadas.forEach(turma => {
                    let disciplinasHtml = '';
                    let disciplinasTurmaCount = 0;
                    let concluidasTurmaCount = 0;

                    if (turma.prof && turma.prof.length > 0) {
                        turma.prof.forEach(p => {
                            disciplinasTurmaCount++;
                            totalGeralDisciplinas++;

                            const concluido = p.statusDiario === true;
                            if (concluido) {
                                totalGeralConcluidas++;
                                concluidasTurmaCount++;
                            }

                            disciplinasHtml += `
                                <div class="disciplina-row">
                                    <span>${p.disciplina}</span>
                                    <span class="status-tag ${concluido ? 'status-true' : 'status-false'}">
                                        ${concluido ? 'PRONTO' : 'PENDENTE'}
                                    </span>
                                </div>
                            `;
                        });
                    }

                    const isTurmaTotalmentePronta = disciplinasTurmaCount > 0 && disciplinasTurmaCount === concluidasTurmaCount;

                    html += `
                        <div class="turma-item ${isTurmaTotalmentePronta ? 'turma-concluida' : ''}">
                            <div class="turma-header-info">
                                <div class="turma-nome">${turma.nome}</div>
                                <div class="turma-status-mini">${turma.diarios || ''}</div>
                            </div>
                            ${disciplinasHtml || '<p style="font-size:11px; opacity:0.5">Sem disciplinas.</p>'}
                        </div>
                    `;
                });

                container.innerHTML = html;

                if (totalGeralDisciplinas > 0 && totalGeralConcluidas === totalGeralDisciplinas && statusGeral === "Finalizado") {

                    jaFinalizouTudo = true;
                    clearInterval(atualizarStatus);

                    console.log("Iniciando download único...");

                    const linkDownload = document.createElement('a');
                    linkDownload.href = '/diarios/download';
                    document.body.appendChild(linkDownload);
                    linkDownload.click();
                    document.body.removeChild(linkDownload);

                    setTimeout(() => {
                        window.location.href = "/download";
                    }, 1500);
                }

            } catch (error) {
                console.error("Erro ao buscar turmas:", error);
            }
        }

        setInterval(atualizarStatus, 2000);
        atualizarStatus();
        setInterval(() => {
            fetch('/api/ping').catch(() => { });
        }, 3000);
    </script>
</body>

</html>
