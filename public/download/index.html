<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Concluído | Portal Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0047AB;
            --primary-green: #059669;
            --glow-blue: rgba(0, 71, 171, 0.6);
            --glow-green: rgba(5, 150, 105, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            height: 100vh;
            background: #020617;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .aurora-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            background: var(--primary-blue);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .blob-2 {
            background: var(--primary-green);
            bottom: -10%;
            right: -10%;
            animation-duration: 30s;
        }

        .blob-3 {
            background: #4f46e5;
            top: 40%;
            left: 30%;
            animation-duration: 20s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(200px, 100px) scale(1.2);
            }
        }

        .header-logos {
            position: absolute;
            top: 40px;
            display: flex;
            gap: 30px;
            align-items: center;
            z-index: 10;
        }

        .logo-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .logo-wrapper img {
            height: 60px;
            filter: brightness(1.1);
        }

        .success-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 60px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            box-shadow: 0 0 30px var(--glow-green);
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }

        .countdown-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        button:hover {
            background: white;
            color: black;
            transform: translateY(-5px);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="header-logos">
        <div class="logo-wrapper">
            <img src="https://cdn.es.gov.br/images/logo/governo/brasao/center/Brasao_Governo.png" alt="Governo">
        </div>
        <div class="logo-wrapper">
            <img src="/img/2.png" alt="Mário Gurgel">
        </div>
        <div class="logo-wrapper">
            <img src="/img/1.png" alt="Escola do Futuro">
        </div>
    </header>

    <main class="success-card">
        <div class="check-icon">✓</div>
        <h1>Download Pronto!</h1>
        <p class="message">A planilha foi gerada com sucesso e enviada para o seu computador.</p>

        <div class="countdown-container">
            Redirecionando em <span id="timer">30</span> segundos...
        </div>

        <button onclick="window.location.href='/inicio'">VOLTAR AGORA</button>
    </main>

    <footer>
        EEEM Mário Gurgel • Security Protocol v4.0
    </footer>

    <script>
        let timeLeft = 30;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = '/inicio';
            }
        }, 1000);
        setInterval(() => {
            fetch('/api/ping').catch(() => { });
        }, 3000);
    </script>
</body>

</html>
