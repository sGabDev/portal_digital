<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ultra | EEEM Mário Gurgel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0047AB;
            --primary-red: #D32F2F;
            --glow-blue: rgba(0, 71, 171, 0.6);
            --glow-red: rgba(211, 47, 47, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            height: 100vh;
            background: #020617;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .aurora-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            background: var(--primary-blue);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .blob-2 {
            background: var(--primary-red);
            bottom: -10%;
            right: -10%;
            animation-duration: 30s;
        }

        .blob-3 {
            background: #4f46e5;
            top: 40%;
            left: 30%;
            animation-duration: 20s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(200px, 100px) scale(1.2);
            }
        }

        .header-logos {
            position: absolute;
            top: 40px;
            display: flex;
            gap: 30px;
            align-items: center;
            z-index: 10;
        }

        .logo-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .logo-wrapper img {
            height: 60px;
            filter: brightness(1.1);
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 60px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 15px;
        }

        .input-container {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 22px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            text-align: center;
            transition: all 0.4s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 30px var(--glow-blue);
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-red), #ff1f1f);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 30px var(--glow-red);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .error-overlay {
            position: absolute;
            inset: 0;
            background: rgba(211, 47, 47, 0.1);
            display: none;
            pointer-events: none;
            border-radius: 40px;
            border: 2px solid var(--primary-red);
            z-index: 5;
        }

        .error-msg {
            color: #ff8a8a;
            font-size: 12px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            text-transform: uppercase;
        }

        .shake {
            animation: shake 0.5s both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="header-logos">
        <div class="logo-wrapper">
            <img src="https://cdn.es.gov.br/images/logo/governo/brasao/center/Brasao_Governo.png" alt="Governo">
        </div>
        <div class="logo-wrapper">
            <img src="/img/2.png" alt="Mário Gurgel">
        </div>
        <div class="logo-wrapper">
            <img src="/img/1.png" alt="Escola do Futuro">
        </div>
    </header>

    <main class="login-card" id="card">
        <div class="error-overlay" id="overlay"></div>
        <h1>Portal Digital</h1>
        <p>Controle de Frequência e Diários</p>

        <form id="loginForm">
            <div class="input-container">
                <input type="text" id="cpf" name="cpf" placeholder="CPF" maxlength="11" required
                    style="letter-spacing: 2px; margin-bottom: 15px;">

                <input type="password" id="pass" name="senha" placeholder="SENHA SEGES" required
                    style="letter-spacing: 2px;">

                <div class="error-msg" id="msg">Acesso negado: Credenciais inválidas</div>
            </div>

            <button type="button" id="btn" onclick="auth()">
                <span id="txt">AUTENTICAR NO SEGES</span>
                <div class="loader" id="load"></div>
            </button>
        </form>
    </main>

    <footer>
        EEEM Mário Gurgel • Security Protocol v4.0
    </footer>

    <script>
        const cpfInput = document.getElementById('cpf');
        const passInput = document.getElementById('pass');
        const card = document.getElementById('card');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');
        const btnTxt = document.getElementById('txt');
        const loader = document.getElementById('load');
        const btn = document.getElementById('btn');

        async function auth() {
            const cpf = cpfInput.value;
            const senha = passInput.value;

            if (!cpf || !senha) {
                alert("Por favor, preencha o CPF e a Senha.");
                return;
            }

            btnTxt.style.display = 'none';
            loader.style.display = 'block';
            msg.style.display = 'none';
            overlay.style.display = 'none';
            card.classList.remove('shake');
            btn.disabled = true;

            try {
                const response = await fetch('/login-local', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf: cpf, senha: senha })
                });

                const data = await response.json();

                if (data.success) {
                    loader.style.display = 'none';
                    btnTxt.style.display = 'block';
                    btnTxt.innerHTML = "ACESSO CONCEDIDO";
                    btn.style.background = "#059669";
                    btn.style.boxShadow = "0 10px 30px rgba(5, 150, 105, 0.4)";

                    setTimeout(() => {
                        window.location.href = '/seletor';
                    }, 1000);
                } else {
                    throw new Error('Falha na autenticação');
                }
            } catch (err) {
                setTimeout(() => {
                    btn.disabled = false;
                    loader.style.display = 'none';
                    btnTxt.style.display = 'block';
                    card.classList.add('shake');
                    overlay.style.display = 'block';
                    msg.style.display = 'block';
                    passInput.value = "";
                    passInput.focus();
                }, 800);
            }
        }

        [cpfInput, passInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    auth();
                }
            });
        });
        setInterval(() => {
            fetch('/api/ping').catch(() => { });
        }, 3000);
    </script>
</body>

</html>
